name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Run ruff
        run: ruff check dowse tests

      - name: Run pytest
        run: pytest -q

  wheel-smoke:
    name: Wheel install smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*

      - name: Install wheel in isolated venv and smoke-test CLI
        run: |
          python -m venv .wheel-smoke
          .wheel-smoke\Scripts\python -m pip install --upgrade pip
          $wheel = Get-ChildItem dist\*.whl | Select-Object -First 1
          .wheel-smoke\Scripts\python -m pip install $wheel.FullName
          .wheel-smoke\Scripts\dowse --help
          .wheel-smoke\Scripts\dowse serve --help
          .wheel-smoke\Scripts\dowse status --db .wheel-smoke-missing-index
