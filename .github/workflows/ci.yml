name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Run ruff
        run: ruff check dowse tests

      - name: Run pytest
        run: pytest -q
